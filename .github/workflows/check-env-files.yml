name: Check for Committed Env Files

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-env-files:
    name: Detect committed .env files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for committed env files
        run: |
          # Find any .env* files tracked by git
          # Exclude safe template files: .env.example, .env.template, .env.sample, .env.dist
          ENV_FILES=$(git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -vE '\.env\.(example|template|sample|dist)$' || true)

          if [ -n "$ENV_FILES" ]; then
            echo "::error::Committed .env files detected! Remove them from version control immediately:"
            echo "$ENV_FILES"
            exit 1
          else
            echo "No committed .env files found."
          fi
